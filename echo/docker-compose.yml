version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: echo-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/rag/docs:/app/rag/docs
      - rag_index:/app/rag
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - echo-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: echo-frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - echo-network
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://backend:8000

volumes:
  rag_index:
    driver: local

networks:
  echo-network:
    driver: bridge
